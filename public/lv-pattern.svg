<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <g fill="#d4af37">
    <!-- merkez dort yaprakli cicek (quatrefoil) -->
    <g transform="translate(50,50)">
      <circle cx="0" cy="-10" r="7.5"/>
      <circle cx="0" cy="10" r="7.5"/>
      <circle cx="-10" cy="0" r="7.5"/>
      <circle cx="10" cy="0" r="7.5"/>
      <circle cx="0" cy="0" r="4"/>
    </g>
    <!-- kenar ortasi elmas/yildiz -->
    <path d="M50 16 L54.5 28 L50 40 L45.5 28 Z"/>
    <path d="M50 60 L54.5 72 L50 84 L45.5 72 Z"/>
    <path d="M16 50 L28 45.5 L40 50 L28 54.5 Z"/>
    <path d="M60 50 L72 45.5 L84 50 L72 54.5 Z"/>
  </g>
  <!-- koselerdeki noktalar: 4 tile birlesince tam cicek olur -->
  <g fill="#c9a227">
    <circle cx="0" cy="0" r="6"/>
    <circle cx="100" cy="0" r="6"/>
    <circle cx="0" cy="100" r="6"/>
    <circle cx="100" cy="100" r="6"/>
  </g>
</svg>
